<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Saucisson Shooter Zen</title>
    <style>
        body {
            margin: 0;
            background-color: #1a1a2e;
            color: white;
            font-family: 'Arial Black', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
        }
        #ui { margin-bottom: 10px; text-align: center; }
        .score-val { color: #e94560; font-size: 2rem; }
        .level-val { color: #00fff2; font-size: 1.2rem; margin-left: 10px; }
        canvas {
            border: 4px solid #e94560;
            background-color: #16213e;
            max-width: 95vw;
            max-height: 70vh;
        }
        .hint { font-size: 0.8rem; color: #888; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="ui">
        <div>SCORE: <span id="score" class="score-val">0</span> <span id="level" class="level-val">Niveau: 1</span></div>
    </div>
    <canvas id="gameCanvas" width="400" height="600"></canvas>
    <p class="hint">Glisse pour bouger | Tapote pour tirer</p>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score');
        const levelDisplay = document.getElementById('level');

        let score = 0;
        let level = 1;
        let gameActive = true;

        // RÉGLAGES PLUS LENTS
        let baseEnemySpeed = 1.2; 
        let spawnRate = 120; // Beaucoup moins de cibles au début

        const player = {
            x: canvas.width / 2 - 40,
            y: canvas.height - 60,
            w: 100,
            h: 30
        };

        let projectiles = [];
        let enemies = [];
        let enemyTimer = 0;

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const scaleX = canvas.width / rect.width;
            player.x = (touch.clientX - rect.left) * scaleX - (player.w / 2);
            if (player.x < 0) player.x = 0;
            if (player.x > canvas.width - player.w) player.x = canvas.width - player.w;
        }, { passive: false });

        canvas.addEventListener('touchstart', (e) => {
            if (!gameActive) {
                resetGame();
                return;
            }
            projectiles.push({ x: player.x + (player.w/2) - 15, y: player.y, speed: 10 });
            playSfx(440, 'square', 0.05);
        }, { passive: false });

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSfx(f, t, d) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.type = t; o.frequency.value = f;
            g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + d);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + d);
        }

        function resetGame() {
            score = 0;
            level = 1;
            baseEnemySpeed = 1.2;
            spawnRate = 120;
            scoreDisplay.textContent = score;
            levelDisplay.textContent = "Niveau: 1";
            enemies = [];
            projectiles = [];
            gameActive = true;
            requestAnimationFrame(loop);
        }

        function updateDifficulty() {
            let newLevel = Math.floor(score / 30) + 1;
            if (newLevel > level) {
                level = newLevel;
                levelDisplay.textContent = "Niveau: " + level;
                baseEnemySpeed += 0.4; 
                spawnRate = Math.max(20, spawnRate - 15); 
                playSfx(880, 'sine', 0.3);
            }
        }

        function loop() {
            if (!gameActive) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#ff4d4d';
            ctx.font = 'bold 20px Arial';
            ctx.fillText('SAUCISSON', player.x, player.y + 20);

            projectiles.forEach((p, index) => {
                p.y -= p.speed;
                ctx.fillStyle = '#ffbd69';
                ctx.font = 'bold 16px Arial';
                ctx.fillText('(( ))', p.x, p.y); 
                if (p.y < 0) projectiles.splice(index, 1);
            });

            enemyTimer++;
            if (enemyTimer > spawnRate) {
                enemies.push({ 
                    x: Math.random() * (canvas.width - 80), 
                    y: -20, 
                    speed: baseEnemySpeed + (Math.random() * 0.5) 
                });
                enemyTimer = 0;
            }

            enemies.forEach((en, eIdx) => {
                en.y += en.speed;
                ctx.fillStyle = '#00f2ff';
                ctx.font = 'bold 18px Arial';
                ctx.fillText('ARABES', en.x, en.y);

                projectiles.forEach((p, pIdx) => {
                    if (p.x > en.x - 20 && p.x < en.x + 80 && p.y > en.y - 20 && p.y < en.y + 10) {
                        enemies.splice(eIdx, 1);
                        projectiles.splice(pIdx, 1);
                        score += 10;
                        scoreDisplay.textContent = score;
                        updateDifficulty();
                        playSfx(150, 'sawtooth', 0.1);
                    }
                });

                if (en.y > canvas.height) {
                    gameActive = false;
                    ctx.fillStyle = 'white';
                    ctx.textAlign = 'center';
                    ctx.font = '40px Arial';
                    ctx.fillText('GAME OVER', canvas.width/2, canvas.height/2);
                    ctx.font = '20px Arial';
                    ctx.fillText('Tape pour rejouer', canvas.width/2, canvas.height/2 + 50);
                    ctx.textAlign = 'start';
                }
            });

            requestAnimationFrame(loop);
        }

        resetGame();
    </script>
</body>
</html>
