<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saucisson vs Harabe</title>
    <style>
        body {
            font-family: 'Arial Black', sans-serif;
            background-color: #2c3e50;
            color: #ecf0f1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        #score { font-size: 2.5rem; color: #f1c40f; margin-bottom: 10px; }
        canvas {
            border: 5px solid #bdc3c7;
            background-color: #34495e;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .instructions { margin-top: 15px; color: #bdc3c7; }
    </style>
</head>
<body>

    <div id="score">0</div>
    <canvas id="gameCanvas" width="500" height="500"></canvas>
    <p class="instructions">Utilise les flèches pour diriger le SAUCISSON !</p>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');

        const GRID = 25;
        let saucisson = [{x: 10 * GRID, y: 10 * GRID}];
        let harabe = {x: 0, y: 0};
        let dir = 'right';
        let score = 0;
        let gameSpeed = 150;

        function placeHarabe() {
            harabe.x = Math.floor(Math.random() * (canvas.width / GRID)) * GRID;
            harabe.y = Math.floor(Math.random() * (canvas.height / GRID)) * GRID;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Dessiner le HARABE (la cible)
            ctx.fillStyle = "#e74c3c";
            ctx.font = "bold 14px Arial";
            ctx.textAlign = "center";
            ctx.fillText("HARABE", harabe.x + GRID/2, harabe.y + GRID/1.5);

            // Dessiner le SAUCISSON (le serpent)
            saucisson.forEach((part, index) => {
                ctx.fillStyle = index === 0 ? "#f39c12" : "#f1c40f";
                ctx.font = "bold 12px Arial";
                // On affiche le mot SAUCISSON pour chaque segment
                ctx.fillText("SAUCISSON", part.x + GRID/2, part.y + GRID/1.5);
            });
        }

        function update() {
            const head = {x: saucisson[0].x, y: saucisson[0].y};

            if (dir === 'left') head.x -= GRID;
            if (dir === 'right') head.x += GRID;
            if (dir === 'up') head.y -= GRID;
            if (dir === 'down') head.y += GRID;

            // Collision murs
            if (head.x < 0 || head.x >= canvas.width || head.y < 0 || head.y >= canvas.height) {
                reset();
                return;
            }

            // Collision corps
            for (let part of saucisson) {
                if (head.x === part.x && head.y === part.y) {
                    reset();
                    return;
                }
            }

            saucisson.unshift(head);

            // Manger le Harabe
            if (head.x === harabe.x && head.y === harabe.y) {
                score++;
                scoreElement.textContent = score;
                placeHarabe();
            } else {
                saucisson.pop();
            }
        }

        function reset() {
            alert("Game Over ! Score: " + score);
            saucisson = [{x: 10 * GRID, y: 10 * GRID}];
            dir = 'right';
            score = 0;
            scoreElement.textContent = score;
            placeHarabe();
        }

        window.addEventListener('keydown', e => {
            if (e.key === 'ArrowLeft' && dir !== 'right') dir = 'left';
            if (e.key === 'ArrowRight' && dir !== 'left') dir = 'right';
            if (e.key === 'ArrowUp' && dir !== 'down') dir = 'up';
            if (e.key === 'ArrowDown' && dir !== 'up') dir = 'down';
        });

        placeHarabe();
        setInterval(() => {
            update();
            draw();
        }, gameSpeed);
    </script>
</body>
</html>
