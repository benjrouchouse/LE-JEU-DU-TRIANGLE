<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Triangle Pop - Addictif & Sonore</title>
    <style>
        body {
            font-family: 'Arial Black', sans-serif;
            background: radial-gradient(circle, #1a1a2e, #16213e);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        #ui { text-align: center; margin-bottom: 15px; }
        #score-label { font-size: 1.2rem; color: #00fff2; text-transform: uppercase; }
        #score { font-size: 3.5rem; text-shadow: 0 0 20px #e94560; color: #e94560; }
        canvas {
            border: 5px solid #0f3460;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            background-color: #0f3460;
            cursor: pointer;
        }
        .instructions { margin-top: 15px; font-size: 0.9rem; color: #888; }
    </style>
</head>
<body>

    <div id="ui">
        <div id="score-label">Points</div>
        <div id="score">0</div>
    </div>
    
    <canvas id="gameCanvas" width="360" height="480"></canvas>
    <p class="instructions">Alignez 3 triangles identiques !</p>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');

        // --- Paramètres ---
        const ROWS = 8;
        const COLS = 6;
        const TILE_SIZE = canvas.width / COLS;
        const COLORS = ['#FF0000', '#00FF00', '#0088FF', '#FFFF00', '#FF00FF'];
        
        let grid = [];
        let score = 0;
        let isAnimating = false;
        let selected = null;

        // --- Moteur Audio (Web Audio API) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(freq, type, duration) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function playMatchSound() {
            playSound(440, 'triangle', 0.3);
            setTimeout(() => playSound(660, 'triangle', 0.3), 100);
            setTimeout(() => playSound(880, 'triangle', 0.4), 200);
        }

        function playSelectSound() {
            playSound(220, 'sine', 0.1);
        }

        // --- Logique du Jeu ---
        function init() {
            for (let r = 0; r < ROWS; r++) {
                grid[r] = [];
                for (let c = 0; c < COLS; c++) {
                    grid[r][c] = { color: Math.floor(Math.random()*COLORS.length), r, c, y: r*TILE_SIZE };
                }
            }
            if(findMatches().length > 0) init(); // Éviter les combos au démarrage
            draw();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            grid.forEach(row => row.forEach(tile => {
                if (!tile) return;
                const x = tile.c * TILE_SIZE;
                const y = tile.y;
                
                // Dessin du triangle
                ctx.fillStyle = COLORS[tile.color];
                ctx.beginPath();
                ctx.moveTo(x + TILE_SIZE/2, y + 10);
                ctx.lineTo(x + 10, y + TILE_SIZE - 10);
                ctx.lineTo(x + TILE_SIZE - 10, y + TILE_SIZE - 10);
                ctx.closePath();
                ctx.fill();

                if (selected && selected.r === tile.r && selected.c === tile.c) {
                    ctx.strokeStyle = "white";
                    ctx.lineWidth = 4;
                    ctx.stroke();
                }
            }));
        }

        function findMatches() {
            let matches = [];
            // Horizontaux
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS - 2; c++) {
                    if (grid[r][c] && grid[r][c+1] && grid[r][c+2] &&
                        grid[r][c].color === grid[r][c+1].color && grid[r][c].color === grid[r][c+2].color) {
                        matches.push({r,c}, {r,c:c+1}, {r,c:c+2});
                    }
                }
            }
            // Verticaux
            for (let c = 0; c < COLS; c++) {
                for (let r = 0; r < ROWS - 2; r++) {
                    if (grid[r][c] && grid[r+1][c] && grid[r+2][c] &&
                        grid[r][c].color === grid[r+1][c].color && grid[r][c].color === grid[r+2][c].color) {
                        matches.push({r,c}, {r:r+1,c}, {r:r+2,c});
                    }
                }
            }
            return matches;
        }

        async function processTurn() {
            let matches = findMatches();
            if (matches.length > 0) {
                isAnimating = true;
                playMatchSound();
                score += matches.length * 10;
                scoreElement.textContent = score;

                matches.forEach(m => grid[m.r][m.c] = null);
                draw();
                await new Promise(r => setTimeout(r, 300));

                // Chute
                for (let c = 0; c < COLS; c++) {
                    let write = ROWS - 1;
                    for (let r = ROWS - 1; r >= 0; r--) {
                        if (grid[r][c]) {
                            grid[write][c] = grid[r][c];
                            grid[write][c].r = write;
                            write--;
                        }
                    }
                    for (let r = write; r >= 0; r--) {
                        grid[r][c] = { color: Math.floor(Math.random()*COLORS.length), r, c, y: -TILE_SIZE };
                    }
                }
                
                await animateFall();
                processTurn(); // Récursif pour les cascades
            } else {
                isAnimating = false;
            }
        }

        function animateFall() {
            return new Promise(resolve => {
                function frame() {
                    let done = true;
                    grid.forEach(row => row.forEach(t => {
                        const target = t.r * TILE_SIZE;
                        if (t.y < target) { t.y += 10; done = false; if(t.y > target) t.y = target; }
                    }));
                    draw();
                    if (done) resolve(); else requestAnimationFrame(frame);
                }
                frame();
            });
        }

        canvas.addEventListener('mousedown', e => {
            if (isAnimating) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const rect = canvas.getBoundingClientRect();
            const c = Math.floor((e.clientX - rect.left) / TILE_SIZE);
            const r = Math.floor((e.clientY - rect.top) / TILE_SIZE);

            if (!selected) {
                selected = grid[r][c];
                playSelectSound();
            } else {
                const dist = Math.abs(r - selected.r) + Math.abs(c - selected.c);
                if (dist === 1) {
                    const temp = grid[r][c].color;
                    grid[r][c].color = selected.color;
                    selected.color = temp;
                    processTurn();
                }
                selected = null;
            }
            draw();
        });

        init();
    </script>
</body>
</html>
