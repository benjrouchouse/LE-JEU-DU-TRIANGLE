<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Saucisson Drift - Racing</title>
    <style>
        body {
            margin: 0;
            background-color: #2c3e50;
            color: white;
            font-family: 'Arial Black', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
        }
        #ui { position: absolute; top: 20px; text-align: center; z-index: 10; pointer-events: none; }
        .score-val { color: #f1c40f; font-size: 2.5rem; text-shadow: 2px 2px #000; }
        canvas {
            background-color: #34495e;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            max-width: 100vw;
            max-height: 80vh;
        }
        .msg { position: absolute; top: 50%; text-align: center; width: 100%; display: none; }
    </style>
</head>
<body>

    <div id="ui">
        <div class="score-val" id="score">0</div>
        <div id="speed-ui">Vitesse: 1x</div>
    </div>
    
    <canvas id="gameCanvas" width="360" height="600"></canvas>
    
    <div id="game-over" class="msg">
        <h1 style="font-size: 3rem; color: #e74c3c;">CRASH !</h1>
        <p>Tape pour recommencer</p>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score');
        const speedDisplay = document.getElementById('speed-ui');
        const gameOverMsg = document.getElementById('game-over');

        let score = 0;
        let gameActive = true;
        let gameSpeed = 5;
        let roadOffset = 0;

        // Configuration Joueur (Ta voiture)
        const player = {
            x: 180 - 25,
            y: 500,
            w: 50,
            h: 80,
            color: '#e74c3c'
        };

        let obstacles = [];
        let obstacleTimer = 0;

        // Audio
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSfx(f, t, d, v=0.1) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.type = t; o.frequency.value = f;
            g.gain.setValueAtTime(v, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + d);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + d);
        }

        // Tactile - Glisser pour bouger
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const scaleX = canvas.width / rect.width;
            player.x = (touch.clientX - rect.left) * scaleX - (player.w / 2);
            
            // Limites de la route
            if (player.x < 40) player.x = 40;
            if (player.x > canvas.width - 40 - player.w) player.x = canvas.width - 40 - player.w;
        }, { passive: false });

        canvas.addEventListener('touchstart', () => {
            if (!gameActive) resetGame();
        });

        function resetGame() {
            score = 0;
            gameSpeed = 5;
            obstacles = [];
            gameActive = true;
            gameOverMsg.style.display = 'none';
            requestAnimationFrame(loop);
        }

        function spawnObstacle() {
            const lanes = [60, 150, 240];
            const lane = lanes[Math.floor(Math.random() * lanes.length)];
            obstacles.push({
                x: lane,
                y: -100,
                w: 50,
                h: 80,
                color: '#f1c40f',
                speed: gameSpeed * 0.8
            });
        }

        function loop() {
            if (!gameActive) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. Dessin de la Route
            ctx.fillStyle = '#2c3e50';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#7f8c8d';
            ctx.fillRect(40, 0, canvas.width - 80, canvas.height);

            // Lignes blanches animées
            ctx.strokeStyle = 'white';
            ctx.setLineDash([40, 40]);
            ctx.lineDashOffset = -roadOffset;
            ctx.lineWidth = 5;
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0); ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();
            roadOffset += gameSpeed;

            // 2. Gestion Joueur
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.w, player.h); // Corps voiture
            ctx.fillStyle = 'black'; // Roues
            ctx.fillRect(player.x-5, player.y+10, 5, 20); ctx.fillRect(player.x+50, player.y+10, 5, 20);
            ctx.fillRect(player.x-5, player.y+50, 5, 20); ctx.fillRect(player.x+50, player.y+50, 5, 20);

            // 3. Gestion Obstacles
            obstacleTimer++;
            if (obstacleTimer > Math.max(20, 100 - gameSpeed * 5)) {
                spawnObstacle();
                obstacleTimer = 0;
            }

            obstacles.forEach((ob, index) => {
                ob.y += gameSpeed;
                ctx.fillStyle = ob.color;
                ctx.fillRect(ob.x, ob.y, ob.w, ob.h);

                // Collision
                if (player.x < ob.x + ob.w && player.x + player.w > ob.x &&
                    player.y < ob.y + ob.h && player.y + player.h > ob.y) {
                    gameActive = false;
                    playSfx(100, 'sawtooth', 0.5, 0.3);
                    gameOverMsg.style.display = 'block';
                }

                if (ob.y > canvas.height) {
                    obstacles.splice(index, 1);
                    score += 10;
                    scoreDisplay.textContent = score;
                    gameSpeed += 0.1; // Accélération progressive
                    speedDisplay.textContent = "Vitesse: " + (gameSpeed/5).toFixed(1) + "x";
                    playSfx(600, 'sine', 0.1, 0.05);
                }
            });

            requestAnimationFrame(loop);
        }

        resetGame();
    </script>
</body>
</html>
