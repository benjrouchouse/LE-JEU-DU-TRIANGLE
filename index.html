<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Saucisson Shooter Mobile</title>
    <style>
        body {
            margin: 0;
            background-color: #1a1a2e;
            color: white;
            font-family: 'Arial Black', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none; /* Empêche le zoom et le défilement pendant le jeu */
        }
        canvas {
            border: 4px solid #e94560;
            background-color: #16213e;
            max-width: 95vw;
            max-height: 70vh;
        }
        #ui { margin-bottom: 10px; text-align: center; }
        .score-val { color: #e94560; font-size: 2rem; }
        .hint { font-size: 0.8rem; color: #888; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="ui">
        <div>SCORE: <span id="score" class="score-val">0</span></div>
    </div>
    <canvas id="gameCanvas" width="400" height="600"></canvas>
    <p class="hint">Glisse pour bouger | Tapote pour tirer</p>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score');

        let score = 0;
        let gameActive = true;

        const player = {
            x: canvas.width / 2 - 40,
            y: canvas.height - 60,
            w: 100,
            h: 30
        };

        let projectiles = [];
        let enemies = [];
        let enemyTimer = 0;

        // --- GESTION DU TACTILE ---
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const scaleX = canvas.width / rect.width;
            
            // On centre le joueur sous le doigt
            player.x = (touch.clientX - rect.left) * scaleX - (player.w / 2);

            // Empêcher de sortir de l'écran
            if (player.x < 0) player.x = 0;
            if (player.x > canvas.width - player.w) player.x = canvas.width - player.w;
        }, { passive: false });

        canvas.addEventListener('touchstart', (e) => {
            if (!gameActive) {
                resetGame();
                return;
            }
            // Tirer lors d'un tap
            projectiles.push({ x: player.x + (player.w/2) - 15, y: player.y, speed: 10 });
            playSfx(440, 'square', 0.1);
        }, { passive: false });

        // Moteur Audio simple
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSfx(f, t, d) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.type = t; o.frequency.value = f;
            g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + d);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + d);
        }

        function resetGame() {
            score = 0;
            scoreDisplay.textContent = score;
            enemies = [];
            projectiles = [];
            gameActive = true;
            requestAnimationFrame(loop);
        }

        function loop() {
            if (!gameActive) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Dessin Joueur (SAUCISSON)
            ctx.fillStyle = '#ff4d4d';
            ctx.font = 'bold 20px Arial';
            ctx.fillText('SAUCISSON', player.x, player.y + 20);

            // Gestion Projectiles (Saucisses)
            projectiles.forEach((p, index) => {
                p.y -= p.speed;
                ctx.fillStyle = '#ffbd69';
                ctx.font = 'bold 16px Arial';
                ctx.fillText('(( ))', p.x, p.y); 

                if (p.y < 0) projectiles.splice(index, 1);
            });

            // Gestion Ennemis (HARABE)
            enemyTimer++;
            if (enemyTimer > 35) { // Un peu plus rapide
                enemies.push({ 
                    x: Math.random() * (canvas.width - 80), 
                    y: -20, 
                    speed: 3 + Math.random() * 2 
                });
                enemyTimer = 0;
            }

            enemies.forEach((en, eIdx) => {
                en.y += en.speed;
                ctx.fillStyle = '#00f2ff';
                ctx.font = 'bold 18px Arial';
                ctx.fillText('HARABE', en.x, en.y);

                // Collision avec projectiles
                projectiles.forEach((p, pIdx) => {
                    if (p.x > en.x - 20 && p.x < en.x + 80 && p.y > en.y - 20 && p.y < en.y + 10) {
                        enemies.splice(eIdx, 1);
                        projectiles.splice(pIdx, 1);
                        score += 10;
                        scoreDisplay.textContent = score;
                        playSfx(150, 'sawtooth', 0.1);
                    }
                });

                // Collision avec le bas (Game Over)
                if (en.y > canvas.height) {
                    gameActive = false;
                    ctx.fillStyle = 'white';
                    ctx.textAlign = 'center';
                    ctx.font = '40px Arial';
                    ctx.fillText('PERDU !', canvas.width/2, canvas.height/2);
                    ctx.font = '20px Arial';
                    ctx.fillText('Tape pour rejouer', canvas.width/2, canvas.height/2 + 50);
                    ctx.textAlign = 'start';
                }
            });

            requestAnimationFrame(loop);
        }

        resetGame();
    </script>
</body>
</html>
