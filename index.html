<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saucisson Shooter</title>
    <style>
        body {
            margin: 0;
            background-color: #1a1a2e;
            color: white;
            font-family: 'Arial Black', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        canvas {
            border: 4px solid #e94560;
            background-color: #16213e;
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
        }
        #ui {
            margin-bottom: 10px;
            text-align: center;
        }
        .score-val { color: #e94560; font-size: 2rem; }
    </style>
</head>
<body>

    <div id="ui">
        <div>SCORE: <span id="score" class="score-val">0</span></div>
    </div>
    <canvas id="gameCanvas" width="400" height="600"></canvas>
    <p>Flèches ← → pour bouger | ESPACE pour tirer</p>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score');

        let score = 0;
        let gameActive = true;

        // Configuration du joueur (SAUCISSON)
        const player = {
            x: canvas.width / 2 - 40,
            y: canvas.height - 40,
            w: 80,
            h: 20,
            speed: 7
        };

        let keys = {};
        let projectiles = [];
        let enemies = [];
        let enemyTimer = 0;

        // Moteur Audio simple
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSfx(f, t, d) {
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.type = t; o.frequency.value = f;
            g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + d);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + d);
        }

        window.addEventListener('keydown', e => { 
            keys[e.key] = true;
            if (e.key === ' ' && gameActive) {
                projectiles.push({ x: player.x + 30, y: player.y, speed: 8 });
                playSfx(440, 'square', 0.1);
            }
            if (e.key === ' ' && !gameActive) resetGame();
        });
        window.addEventListener('keyup', e => keys[e.key] = false);

        function resetGame() {
            score = 0;
            scoreDisplay.textContent = score;
            enemies = [];
            projectiles = [];
            gameActive = true;
            loop();
        }

        function loop() {
            if (!gameActive) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Déplacement joueur
            if (keys['ArrowLeft'] && player.x > 0) player.x -= player.speed;
            if (keys['ArrowRight'] && player.x < canvas.width - player.w) player.x += player.speed;

            // Dessin Joueur
            ctx.fillStyle = '#ff4d4d';
            ctx.font = 'bold 16px Arial';
            ctx.fillText('SAUCISSON', player.x, player.y);

            // Gestion Projectiles (Saucisses)
            projectiles.forEach((p, index) => {
                p.y -= p.speed;
                ctx.fillStyle = '#ffbd69';
                ctx.font = '12px Arial';
                ctx.fillText('((()))', p.x, p.y); // Dessin d'une petite saucisse

                if (p.y < 0) projectiles.splice(index, 1);
            });

            // Gestion Ennemis (HARABE)
            enemyTimer++;
            if (enemyTimer > 40) {
                enemies.push({ 
                    x: Math.random() * (canvas.width - 60), 
                    y: -20, 
                    speed: 2 + Math.random() * 2 
                });
                enemyTimer = 0;
            }

            enemies.forEach((en, eIdx) => {
                en.y += en.speed;
                ctx.fillStyle = '#00f2ff';
                ctx.font = 'bold 14px Arial';
                ctx.fillText('HARABE', en.x, en.y);

                // Collision avec projectiles
                projectiles.forEach((p, pIdx) => {
                    if (p.x > en.x && p.x < en.x + 60 && p.y > en.y - 15 && p.y < en.y) {
                        enemies.splice(eIdx, 1);
                        projectiles.splice(pIdx, 1);
                        score += 10;
                        scoreDisplay.textContent = score;
                        playSfx(150, 'sawtooth', 0.2);
                    }
                });

                // Collision avec le bas (Game Over)
                if (en.y > canvas.height) {
                    gameActive = false;
                    ctx.fillStyle = 'white';
                    ctx.font = '30px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText('GAME OVER', canvas.width/2, canvas.height/2);
                    ctx.font = '15px Arial';
                    ctx.fillText('Espace pour rejouer', canvas.width/2, canvas.height/2 + 40);
                    ctx.textAlign = 'start';
                }
            });

            requestAnimationFrame(loop);
        }

        resetGame();
    </script>
</body>
</html>
